name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  host-tests:
    name: Host tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: host/requirements.txt

      - name: Install host dependencies
        run: python -m pip install -r host/requirements.txt

      - name: Verify transport imports
        run: python -c "import bleak, serial"

      - name: Run host tests
        env:
          PYTHONDONTWRITEBYTECODE: "1"
        run: python -m unittest discover -s host/tests -v

      - name: Verify command-line entry point
        run: python host/dualkey_light.py --help

  firmware-build:
    name: Firmware build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: host/requirements.txt

      - name: Install PlatformIO
        run: python -m pip install platformio

      - name: Build firmware
        run: python -m platformio run
